<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CAdesk.ai — AI Assistant for Indian Chartered Accountants</title>
<meta name="description" content="The AI tool built for Indian CA firms. Draft GST notices, audit reports, client emails and tax advisory letters in seconds.">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700;900&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --ink: #0f0e0b;
  --paper: #f5f2eb;
  --cream: #ede9df;
  --warm: #e8e2d4;
  --gold: #b8860b;
  --gold-light: #d4a017;
  --text: #1a1816;
  --muted: #6b6560;
  --border: #d4cfc5;
  --surface: #ffffff;
  --green: #1a7a4a;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }
body {
  background: var(--paper);
  color: var(--text);
  font-family: 'IBM Plex Sans', sans-serif;
  font-size: 16px; line-height: 1.6;
}

/* ── NAV ── */
nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  display: flex; align-items: center; justify-content: space-between;
  padding: 18px 48px;
  background: rgba(245,242,235,0.94);
  backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--border);
}
.logo { font-family: 'Playfair Display', serif; font-size: 22px; font-weight: 700; color: var(--ink); }
.logo span { color: var(--gold); }
.nav-links { display: flex; gap: 32px; align-items: center; }
.nav-links a { color: var(--muted); text-decoration: none; font-size: 14px; font-weight: 500; transition: color 0.2s; }
.nav-links a:hover { color: var(--text); }
.nav-cta { background: var(--ink) !important; color: var(--paper) !important; padding: 10px 22px; border-radius: 4px; font-weight: 600 !important; font-size: 13px !important; letter-spacing: 0.5px; text-transform: uppercase; }

/* ── HERO ── */
.hero {
  min-height: 100vh;
  display: grid; grid-template-columns: 1fr 1fr;
  align-items: center;
  padding: 120px 48px 80px;
  gap: 80px; max-width: 1200px; margin: 0 auto;
}
.hero-eyebrow {
  display: inline-flex; align-items: center; gap: 10px;
  font-size: 11px; font-weight: 600; letter-spacing: 2.5px; text-transform: uppercase;
  color: var(--gold); margin-bottom: 24px;
}
.hero-eyebrow::before { content: ''; width: 32px; height: 1px; background: var(--gold); }
.hero h1 {
  font-family: 'Playfair Display', serif;
  font-size: clamp(38px, 4.5vw, 58px); font-weight: 900;
  line-height: 1.08; letter-spacing: -1.5px; color: var(--ink); margin-bottom: 24px;
}
.hero h1 em { font-style: italic; color: var(--gold); }
.hero-sub { font-size: 17px; color: var(--muted); font-weight: 300; max-width: 440px; margin-bottom: 40px; line-height: 1.7; }
.hero-btns { display: flex; gap: 14px; flex-wrap: wrap; }
.btn-primary { background: var(--ink); color: var(--paper); padding: 14px 32px; border-radius: 4px; font-weight: 600; font-size: 14px; border: none; cursor: pointer; font-family: 'IBM Plex Sans', sans-serif; transition: background 0.2s, transform 0.15s; }
.btn-primary:hover { background: #2a2720; transform: translateY(-1px); }
.btn-ghost { background: transparent; color: var(--text); padding: 14px 32px; border-radius: 4px; font-weight: 500; font-size: 14px; border: 1.5px solid var(--border); cursor: pointer; font-family: 'IBM Plex Sans', sans-serif; transition: border-color 0.2s, background 0.2s; }
.btn-ghost:hover { border-color: var(--text); background: var(--cream); }

.hero-card {
  background: var(--surface); border: 1px solid var(--border); border-radius: 12px; overflow: hidden;
  box-shadow: 0 24px 80px rgba(15,14,11,0.12), 0 4px 16px rgba(15,14,11,0.06);
  animation: floatCard 6s ease-in-out infinite;
}
@keyframes floatCard { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
.card-header { background: var(--ink); padding: 14px 20px; display: flex; align-items: center; gap: 10px; }
.cdot { width: 10px; height: 10px; border-radius: 50%; }
.card-header-title { font-size: 12px; color: #888; letter-spacing: 1px; text-transform: uppercase; margin: 0 auto; font-weight: 500; }
.card-body { padding: 24px; }
.card-label { font-size: 10px; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; }
.card-input-preview { background: var(--cream); border: 1px solid var(--border); border-radius: 6px; padding: 12px 14px; font-size: 13px; color: var(--text); margin-bottom: 16px; line-height: 1.5; }
.card-output-preview { background: #fff8ee; border: 1px solid #e8d9b0; border-left: 3px solid var(--gold); border-radius: 6px; padding: 14px 16px; font-size: 12.5px; color: var(--text); line-height: 1.65; }
.card-output-preview strong { color: var(--gold); font-size: 11px; letter-spacing: 1px; text-transform: uppercase; display: block; margin-bottom: 6px; }

/* ── STATS ── */
.stats-bar { background: var(--ink); padding: 28px 48px; display: flex; justify-content: center; gap: 80px; flex-wrap: wrap; }
.stat { text-align: center; }
.stat-num { font-family: 'Playfair Display', serif; font-size: 32px; font-weight: 700; color: var(--paper); }
.stat-num span { color: var(--gold-light); }
.stat-label { font-size: 12px; color: #888; letter-spacing: 1px; text-transform: uppercase; margin-top: 2px; }

/* ── SECTION COMMON ── */
.section { padding: 96px 48px; max-width: 1200px; margin: 0 auto; }
.section-tag { font-size: 11px; font-weight: 600; letter-spacing: 3px; text-transform: uppercase; color: var(--gold); margin-bottom: 14px; display: flex; align-items: center; gap: 10px; }
.section-tag::after { content: ''; flex: 1; max-width: 40px; height: 1px; background: var(--gold); }
.section-title { font-family: 'Playfair Display', serif; font-size: clamp(28px, 3.5vw, 44px); font-weight: 700; letter-spacing: -1px; color: var(--ink); margin-bottom: 16px; line-height: 1.15; }
.section-sub { color: var(--muted); max-width: 520px; font-weight: 300; font-size: 17px; line-height: 1.7; }

/* ── AI TOOL ── */
.tool-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; box-shadow: 0 8px 40px rgba(15,14,11,0.08); margin-top: 52px; }
.tool-header { background: var(--ink); padding: 16px 24px; display: flex; align-items: center; gap: 12px; }
.tool-header-title { font-size: 13px; color: #aaa; font-weight: 500; letter-spacing: 0.5px; margin-left: 8px; }
.tool-tabs { display: flex; border-bottom: 1px solid var(--border); padding: 0 24px; overflow-x: auto; background: var(--cream); }
.ttab { padding: 14px 18px; font-size: 13px; font-weight: 500; color: var(--muted); cursor: pointer; border-bottom: 2px solid transparent; white-space: nowrap; background: none; border-top: none; border-left: none; border-right: none; font-family: 'IBM Plex Sans', sans-serif; transition: color 0.2s, border-color 0.2s; }
.ttab.active { color: var(--ink); border-bottom-color: var(--gold); font-weight: 600; }
.tool-body { display: grid; grid-template-columns: 1fr 1fr; min-height: 420px; }
.tool-left { padding: 28px; border-right: 1px solid var(--border); display: flex; flex-direction: column; gap: 16px; }
.tool-right { padding: 28px; background: #fffdf7; display: flex; flex-direction: column; }
.field-label { font-size: 11px; font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); margin-bottom: 6px; }
.quick-chips { display: flex; flex-wrap: wrap; gap: 7px; margin-bottom: 4px; }
.chip { background: var(--cream); border: 1px solid var(--border); color: var(--muted); padding: 5px 12px; border-radius: 3px; font-size: 12px; cursor: pointer; font-family: 'IBM Plex Sans', sans-serif; transition: all 0.15s; }
.chip:hover { background: var(--warm); border-color: var(--gold); color: var(--gold); }
#caInput { width: 100%; background: var(--cream); border: 1.5px solid var(--border); border-radius: 6px; padding: 14px 16px; color: var(--text); font-family: 'IBM Plex Sans', sans-serif; font-size: 14px; outline: none; resize: none; min-height: 120px; line-height: 1.6; transition: border-color 0.2s; }
#caInput:focus { border-color: var(--gold); }
#caInput::placeholder { color: #b0a898; }
.gen-btn { background: var(--ink); color: var(--paper); border: none; border-radius: 6px; padding: 13px 24px; font-weight: 600; font-size: 14px; cursor: pointer; font-family: 'IBM Plex Sans', sans-serif; transition: background 0.2s; display: flex; align-items: center; justify-content: center; gap: 8px; }
.gen-btn:hover { background: #2a2720; }
.gen-btn:disabled { opacity: 0.45; cursor: not-allowed; }
.output-label { font-size: 11px; font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); margin-bottom: 12px; display: flex; align-items: center; justify-content: space-between; }
.copy-tiny { background: var(--cream); border: 1px solid var(--border); color: var(--muted); padding: 4px 10px; border-radius: 3px; font-size: 11px; cursor: pointer; font-family: 'IBM Plex Sans', sans-serif; display: none; transition: all 0.15s; }
.copy-tiny.show { display: inline; }
.copy-tiny:hover { border-color: var(--gold); color: var(--gold); }
#outputBox { flex: 1; background: white; border: 1.5px solid var(--border); border-radius: 6px; padding: 18px; font-size: 13.5px; line-height: 1.75; color: var(--text); overflow-y: auto; white-space: pre-wrap; min-height: 200px; }
.output-placeholder-inner { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; gap: 10px; color: #c5bfb4; font-size: 13px; text-align: center; }
.output-placeholder-inner svg { opacity: 0.35; }
.typing-dots { display: none; gap: 5px; align-items: center; padding: 12px 0; }
.typing-dots.show { display: flex; }
.tdot { width: 7px; height: 7px; background: var(--gold); border-radius: 50%; animation: tdot 1.2s infinite; }
.tdot:nth-child(2){animation-delay:.2s} .tdot:nth-child(3){animation-delay:.4s}
@keyframes tdot{0%,80%,100%{transform:scale(0.6);opacity:0.5}40%{transform:scale(1);opacity:1}}

/* ── FEATURES ── */
.feat-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 2px; margin-top: 52px; border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
.feat-card { background: var(--surface); padding: 36px 32px; border-right: 1px solid var(--border); border-bottom: 1px solid var(--border); transition: background 0.2s; }
.feat-card:hover { background: #fffdf5; }
.feat-card:nth-child(3n) { border-right: none; }
.feat-card:nth-last-child(-n+3) { border-bottom: none; }
.feat-icon { font-size: 26px; margin-bottom: 16px; display: block; }
.feat-title { font-family: 'Playfair Display', serif; font-size: 17px; font-weight: 700; color: var(--ink); margin-bottom: 8px; }
.feat-desc { font-size: 13.5px; color: var(--muted); line-height: 1.65; }

/* ── PRICING ── */
.pricing-toggle-wrap { text-align: center; margin-bottom: 48px; margin-top: 52px; }
.pricing-eyebrow { font-size: 11px; font-weight: 600; letter-spacing: 3px; text-transform: uppercase; color: var(--gold); margin-bottom: 10px; }
.currency-toggle { display: inline-flex; background: var(--cream); border: 1.5px solid var(--border); border-radius: 6px; overflow: hidden; }
.currency-btn { padding: 10px 28px; font-size: 14px; font-weight: 600; cursor: pointer; border: none; background: transparent; color: var(--muted); font-family: 'IBM Plex Sans', sans-serif; transition: all 0.2s; letter-spacing: 0.3px; }
.currency-btn.active { background: var(--ink); color: var(--paper); }

.pricing-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 24px; }
.plan { background: var(--surface); border: 1.5px solid var(--border); border-radius: 10px; overflow: hidden; transition: transform 0.2s, box-shadow 0.2s; position: relative; }
.plan:hover { transform: translateY(-4px); box-shadow: 0 16px 48px rgba(15,14,11,0.1); }
.plan.featured { background: var(--ink); border-color: var(--ink); transform: scale(1.03); }
.plan.featured:hover { transform: scale(1.03) translateY(-4px); }
.popular-ribbon { background: var(--gold); color: var(--ink); font-size: 11px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; text-align: center; padding: 8px; }
.plan-inner { padding: 36px 32px; }
.plan-name { font-family: 'Playfair Display', serif; font-size: 22px; font-weight: 700; margin-bottom: 6px; }
.plan.featured .plan-name { color: var(--paper); }
.plan-desc { font-size: 13px; color: var(--muted); margin-bottom: 24px; }
.plan.featured .plan-desc { color: #888; }
.price-inr, .price-usd { display: none; }
.price-inr.show, .price-usd.show { display: block; margin-bottom: 28px; }
.price-amount { font-family: 'Playfair Display', serif; font-size: 52px; font-weight: 900; letter-spacing: -3px; line-height: 1; color: var(--ink); }
.plan.featured .price-amount { color: var(--paper); }
.price-amount sup { font-size: 22px; letter-spacing: 0; vertical-align: super; }
.price-period { font-size: 13px; color: var(--muted); margin-top: 4px; }
.plan.featured .price-period { color: #777; }
.price-equiv { font-size: 12px; color: var(--muted); margin-top: 3px; font-style: italic; }
.plan.featured .price-equiv { color: #666; }
.plan-divider { border: none; border-top: 1px solid var(--border); margin: 24px 0; }
.plan.featured .plan-divider { border-color: #2a2720; }
.plan-features { list-style: none; margin-bottom: 28px; }
.plan-features li { font-size: 14px; color: var(--muted); padding: 9px 0; border-bottom: 1px solid var(--border); display: flex; align-items: flex-start; gap: 10px; line-height: 1.4; }
.plan.featured .plan-features li { color: #bbb; border-bottom-color: #222; }
.plan-features li:last-child { border-bottom: none; }
.pcheck { color: var(--gold); font-weight: 700; flex-shrink: 0; margin-top: 1px; }
.paypal-label { font-size: 11px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; text-align: center; margin-bottom: 10px; font-weight: 600; }
.plan.featured .paypal-label { color: #666; }
.pp-btn { width: 100%; padding: 13px; border-radius: 6px; font-weight: 700; font-size: 14px; cursor: pointer; border: none; font-family: 'IBM Plex Sans', sans-serif; transition: all 0.2s; display: flex; align-items: center; justify-content: center; gap: 8px; text-decoration: none; margin-bottom: 8px; }
.pp-btn.blue { background: #0070ba; color: white; }
.pp-btn.blue:hover { background: #005ea6; transform: translateY(-1px); }
.pp-btn.yellow { background: #ffc439; color: #003087; }
.pp-btn.yellow:hover { background: #f0b429; transform: translateY(-1px); }
.or-line { text-align: center; font-size: 12px; color: var(--muted); margin: 8px 0; display: flex; align-items: center; gap: 8px; }
.or-line::before, .or-line::after { content: ''; flex: 1; height: 1px; background: var(--border); }
.plan.featured .or-line { color: #555; }
.plan.featured .or-line::before, .plan.featured .or-line::after { background: #2a2720; }

/* ── TESTIMONIALS ── */
.testi-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 24px; margin-top: 52px; }
.testi-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 28px; }
.testi-quote { font-size: 14px; color: var(--text); line-height: 1.7; margin-bottom: 20px; font-style: italic; }
.testi-quote::before { content: '"'; color: var(--gold); font-size: 20px; line-height: 1; display: block; margin-bottom: 6px; font-style: normal; font-family: 'Playfair Display', serif; }
.testi-author { font-size: 13px; font-weight: 600; color: var(--ink); }
.testi-role { font-size: 12px; color: var(--muted); }

/* ── SEO ── */
.seo-section { background: var(--ink); padding: 80px 48px; }
.seo-inner { max-width: 1200px; margin: 0 auto; }
.seo-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 80px; align-items: center; }
.seo-title { font-family: 'Playfair Display', serif; font-size: clamp(26px,3vw,38px); font-weight: 700; color: var(--paper); line-height: 1.2; margin-bottom: 20px; }
.seo-title em { font-style: italic; color: var(--gold-light); }
.seo-body { color: #888; font-size: 15px; line-height: 1.7; font-weight: 300; }
.seo-keywords { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 32px; }
.kw-pill { background: #1e1d1a; border: 1px solid #333; color: #aaa; padding: 7px 16px; border-radius: 3px; font-size: 12px; letter-spacing: 0.5px; }

/* ── TRUST ── */
.trust-bar { background: var(--cream); border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); padding: 48px; }
.trust-inner { max-width: 900px; margin: 0 auto; display: grid; grid-template-columns: repeat(4,1fr); gap: 32px; text-align: center; }
.trust-icon { font-size: 28px; margin-bottom: 10px; }
.trust-title { font-weight: 600; font-size: 14px; color: var(--ink); margin-bottom: 4px; }
.trust-desc { font-size: 12.5px; color: var(--muted); line-height: 1.5; }

/* ── FAQ ── */
.faq-wrap { max-width: 700px; margin: 0 auto; padding: 80px 48px; }
.faq-heading { font-family: 'Playfair Display', serif; font-size: 32px; font-weight: 700; text-align: center; margin-bottom: 40px; letter-spacing: -1px; }
.faq-item { border-bottom: 1px solid var(--border); padding: 20px 0; }
.faq-q { font-weight: 600; font-size: 15px; color: var(--ink); margin-bottom: 10px; }
.faq-a { font-size: 14px; color: var(--muted); line-height: 1.7; }

/* ── CTA ── */
.cta-banner { background: linear-gradient(135deg,#1a1816,#0f0e0b); border-top: 3px solid var(--gold); padding: 80px 48px; text-align: center; }
.cta-title { font-family: 'Playfair Display', serif; font-size: clamp(28px,4vw,48px); font-weight: 700; color: var(--paper); line-height: 1.15; margin-bottom: 16px; letter-spacing: -1px; }
.cta-sub { color: #777; font-size: 17px; font-weight: 300; margin-bottom: 36px; }
.cta-btn { background: var(--gold); color: var(--ink); padding: 16px 48px; border-radius: 4px; font-weight: 700; font-size: 15px; border: none; cursor: pointer; font-family: 'IBM Plex Sans', sans-serif; letter-spacing: 0.5px; transition: background 0.2s, transform 0.15s; }
.cta-btn:hover { background: var(--gold-light); transform: translateY(-2px); }

/* ── FOOTER ── */
footer { background: var(--ink); border-top: 1px solid #222; padding: 40px 48px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 16px; }
.footer-logo { font-family: 'Playfair Display', serif; font-size: 18px; font-weight: 700; color: var(--paper); }
.footer-logo span { color: var(--gold); }
.footer-links { display: flex; gap: 28px; }
.footer-links a { color: #666; text-decoration: none; font-size: 13px; transition: color 0.2s; }
.footer-links a:hover { color: var(--paper); }
.footer-copy { color: #444; font-size: 12px; }

/* ── ANIMATIONS ── */
.reveal { opacity: 0; transform: translateY(28px); transition: opacity 0.65s ease, transform 0.65s ease; }
.reveal.visible { opacity: 1; transform: translateY(0); }

/* ── RESPONSIVE ── */
@media(max-width:900px) {
  nav { padding: 14px 20px; }
  .nav-links { gap: 16px; }
  .hero { grid-template-columns: 1fr; padding: 100px 20px 60px; gap: 40px; }
  .hero-right { display: none; }
  .stats-bar { padding: 28px 20px; gap: 28px; }
  .section { padding: 64px 20px; }
  .tool-body { grid-template-columns: 1fr; }
  .tool-left { border-right: none; border-bottom: 1px solid var(--border); }
  .feat-grid { grid-template-columns: 1fr; }
  .feat-card { border-right: none !important; }
  .pricing-grid { grid-template-columns: 1fr; }
  .plan.featured { transform: scale(1); }
  .seo-grid { grid-template-columns: 1fr; gap: 40px; }
  .testi-grid { grid-template-columns: 1fr; }
  .trust-inner { grid-template-columns: repeat(2,1fr); }
  .seo-section, .cta-banner, .trust-bar, .faq-wrap { padding: 60px 20px; }
  footer { padding: 28px 20px; flex-direction: column; text-align: center; }
  .footer-links { justify-content: center; }
}
</style>
</head>
<body>

<!-- NAV -->
<nav>
  <div class="logo">CAdesk<span>.</span>ai</div>
  <div class="nav-links">
    <a href="#tool">Try Free</a>
    <a href="#features">Features</a>
    <a href
